<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Election Atlas — UK Election Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --panel: #13161e;
      --border: #1e2330;
      --accent: #4e7cff;
      --accent2: #c9a800;
      --text: #e8eaf0;
      --muted: #5a6280;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Slim top bar — sits above the map's own year selector */
    .atlas-topbar {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(13,15,20,0.98);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 500;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-link {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }

    .back-link:hover { color: var(--text); }

    .topbar-title {
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .topbar-title span { color: var(--accent); }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-link {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .topbar-link:hover { color: var(--text); }

    /* Map fills the rest */
    #uk-map {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
  </style>
</head>
<body>

  <div class="atlas-topbar">
    <div class="topbar-left">
      <a href="../index.html" class="back-link">← Home</a>
      <span class="topbar-title">UK <span>Election</span> Atlas</span>
    </div>
    <div class="topbar-right">
      <a href="../index.html#about" class="topbar-link">About</a>
    </div>
  </div>

  <div id="uk-map"></div>

  <!-- Map script — paths assume atlas/ is one level below site root -->
  <script>
    // Pass ?year=2019, ?year=ref2016, ?year=1974O, ?year=1974F from URL
    (function() {
      const STRING_YEARS = ['ref2016', 'model', '1974O', '1974F'];
      const VALID_YEARS = [2024,2019,2017,2015,2010,2005,2001,1997,1992,1987,1983,1979,1970,1966,1964,1959,1955,1951,1950,1945,1935,1931,1929,1924,1923,1922,1918];
      const yr = new URLSearchParams(location.search).get('year');
      if (STRING_YEARS.includes(yr)) {
        window.ATLAS_INITIAL_YEAR = yr;
      } else {
        const n = parseInt(yr);
        window.ATLAS_INITIAL_YEAR = (!isNaN(n) && VALID_YEARS.includes(n)) ? n : 2024;
      }
    })();
  </script>
  <script src="../uk-election-map.js"></script>

</body>
</html>
